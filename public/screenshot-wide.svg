<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#0A0A0A"/>
  
  <!-- Subtle Gradient Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFCD00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCD00"/>
      <stop offset="100%" stop-color="#CC9E00"/>
    </linearGradient>
  </defs>
  <circle cx="640" cy="360" r="600" fill="url(#glow)"/>

  <!-- Mockup App Frame -->
  <rect x="140" y="80" width="1000" height="560" rx="16" fill="#141414" stroke="#222" stroke-width="2"/>
  
  <!-- Sidebar -->
  <rect x="140" y="80" width="220" height="560" fill="#0D0D0D" rx="16"/>
  <!-- Sidebar separator line -->
  <line x1="360" y1="80" x2="360" y2="640" stroke="#222" stroke-width="2"/>
  
  <!-- App Title in Sidebar -->
  <text x="180" y="140" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="24" fill="#FFCD00">ConstruAcha</text>
  <text x="180" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666">CONTROL DE OBRAS</text>

  <!-- Sidebar Menu Items -->
  <rect x="160" y="210" width="180" height="40" rx="8" fill="#FFCD00" fill-opacity="0.1"/>
  <text x="180" y="235" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="14" fill="#FFCD00">Panel Principal</text>
  
  <text x="180" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Nueva Bitácora</text>
  <text x="180" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Historial de Obras</text>
  <text x="180" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Configuración</text>

  <!-- Main Content Dashboard -->
  <!-- Header of content -->
  <text x="400" y="140" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="28" fill="#FFF">Panel de Control</text>
  <text x="400" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Estado de proyectos y reportes diarios</text>
  
  <!-- Stats Cards -->
  <rect x="400" y="200" width="220" height="120" rx="12" fill="#1A1A1A" stroke="#2a2a2a" stroke-width="1"/>
  <text x="420" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Obras Activas</text>
  <text x="420" y="290" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="36" fill="#FFCD00">12</text>

  <rect x="640" y="200" width="220" height="120" rx="12" fill="#1A1A1A" stroke="#2a2a2a" stroke-width="1"/>
  <text x="660" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Reportes Hoy</text>
  <text x="660" y="290" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="36" fill="#FFF">8</text>

  <rect x="880" y="200" width="220" height="120" rx="12" fill="#1A1A1A" stroke="#2a2a2a" stroke-width="1"/>
  <text x="900" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#888">Asistencia</text>
  <text x="900" y="290" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="36" fill="#FFF">98%</text>

  <!-- Large Table/List mockup -->
  <rect x="400" y="350" width="700" height="240" rx="12" fill="#1A1A1A" stroke="#2a2a2a" stroke-width="1"/>
  <text x="420" y="390" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="16" fill="#FFF">Bitácoras Recientes</text>
  
  <!-- Row 1 -->
  <rect x="420" y="415" width="660" height="45" rx="6" fill="#222"/>
  <circle cx="445" cy="437" r="8" fill="#FFCD00"/>
  <text x="470" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#FFF" font-weight="bold">Proyecto Torre Norte</text>
  <text x="700" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Vaciado de concreto completado</text>
  <text x="980" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#FFCD00" font-weight="bold">Hace 10 min</text>

  <!-- Row 2 -->
  <rect x="420" y="475" width="660" height="45" rx="6" fill="#1E1E1E"/>
  <circle cx="445" cy="497" r="8" fill="#FFCD00"/>
  <text x="470" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#FFF" font-weight="bold">Condominio San José</text>
  <text x="700" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Inspección de tuberías sanitarias</text>
  <text x="980" y="502" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Hace 1 hora</text>

  <!-- Row 3 -->
  <rect x="420" y="535" width="660" height="45" rx="6" fill="#1E1E1E"/>
  <circle cx="445" cy="557" r="8" fill="#888"/>
  <text x="470" y="562" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#FFF" font-weight="bold">Carretera Central KM 45</text>
  <text x="700" y="562" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Nivelación de terreno de acceso</text>
  <text x="980" y="562" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#888">Ayer</text>
</svg>
