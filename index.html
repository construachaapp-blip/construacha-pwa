<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConstruAcha AI</title>
    <meta name="theme-color" content="#FFCD00" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ConstruAcha" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo_acha.png" />
    <link rel="apple-touch-icon" href="/logo_acha.png" />
  </head>
  <body class="bg-[#0A0A0A] selection:bg-[#FFCD00] selection:text-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              };
            };
          }).catch(console.error);
        });
      }
    </script>
  </body>
</html>
